name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose files
        run: |
          docker compose config >/tmp/planning-poker-compose.yml
          docker compose -f docker-compose.prod.yml --env-file .env.example config >/tmp/planning-poker-prod-compose.yml

  deploy:
    name: Deploy full stack to production
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    needs: [compose]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /opt/planning-poker-dev
            export DEPLOY_TRIGGER="github:${{ github.repository }}@${{ github.sha }}"
            ./infra/deploy/deploy-prod.sh
