name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deploy:
              - '**'
              - '!docs/**'
              - '!README.md'
              - '!infra/deploy/PRODUCTION.md'
              - '!.cursor/**'

  notify-start:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true'
    needs: [changes]
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-start.yml@main
    with:
      service_label: planning-poker-dev
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose files
        run: |
          docker compose config >/tmp/planning-poker-compose.yml
          docker compose -f docker-compose.prod.yml --env-file .env.example config >/tmp/planning-poker-prod-compose.yml

  deploy:
    name: Deploy full stack to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true'
    needs: [compose, changes]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /opt/planning-poker-dev
            export DEPLOY_TRIGGER="github:${{ github.repository }}@${{ github.sha }}"
            ./infra/deploy/deploy-prod.sh

  notify-result:
    if: always() && !cancelled() && (needs.changes.outputs.deploy == 'true' || needs.compose.result == 'failure')
    needs: [compose, deploy, changes]
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-result.yml@main
    with:
      service_label: planning-poker-dev
      compose_result: ${{ needs.compose.result }}
      deploy_result: ${{ needs.deploy.result }}
      notify_on_success: true
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
